<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:epub="http://www.idpf.org/2007/ops"
      lang="zh-Hant"
      dir="rtl">
<head>
    <title>封面</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" type="text/css" href="styles/vertical.css"/>
</head>
<body>
    <!-- 封面頁：使用 SVG 以確保跨設備一致性 -->
    <svg xmlns="http://www.w3.org/2000/svg"
         xmlns:xlink="http://www.w3.org/1999/xlink"
         version="1.1"
         viewBox="0 0 1200 1600"
         style="width:100%; height:100vh; display:block; margin:0 auto;">
        <!-- 封面背景 -->
        <rect width="1200" height="1600" fill="#f5f0e8"/>

        <!-- 頂部裝飾線 -->
        <line x1="100" y1="200" x2="1100" y2="200" stroke="#8b7355" stroke-width="2"/>
        <line x1="120" y1="210" x2="1080" y2="210" stroke="#8b7355" stroke-width="0.5"/>

        <!-- 書名 -->
        <text x="600" y="650"
              font-family="Noto Serif CJK TC, Source Han Serif TC, serif"
              font-size="96"
              font-weight="bold"
              text-anchor="middle"
              fill="#2c2c2c"
              letter-spacing="0.3em">
            繁體中文
        </text>
        <text x="600" y="800"
              font-family="Noto Serif CJK TC, Source Han Serif TC, serif"
              font-size="96"
              font-weight="bold"
              text-anchor="middle"
              fill="#2c2c2c"
              letter-spacing="0.3em">
            豎排範本
        </text>

        <!-- 副標題 -->
        <text x="600" y="920"
              font-family="Noto Serif CJK TC, serif"
              font-size="36"
              text-anchor="middle"
              fill="#666666"
              letter-spacing="0.2em">
            Chinese Traditional Vertical EPUB
        </text>

        <!-- 分隔線 -->
        <line x1="400" y1="1000" x2="800" y2="1000" stroke="#8b7355" stroke-width="1"/>

        <!-- 作者 -->
        <text x="600" y="1100"
              font-family="Noto Serif CJK TC, serif"
              font-size="32"
              text-anchor="middle"
              fill="#555555"
              letter-spacing="0.2em">
            作者名稱
        </text>

        <!-- 底部裝飾線 -->
        <line x1="120" y1="1390" x2="1080" y2="1390" stroke="#8b7355" stroke-width="0.5"/>
        <line x1="100" y1="1400" x2="1100" y2="1400" stroke="#8b7355" stroke-width="2"/>
    </svg>
</body>
</html>
